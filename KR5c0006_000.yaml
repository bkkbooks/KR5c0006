front:
  text: 太上說東斗主算護命妙經老君告正一天師曰天道冥運文象玄應昭而不言經星常宿中外官品各有司主凡一百一十八名積數七百八十二星二十八宿兩曜五星皆在璇璣以齊七政五天大號靈斗帝君南北建候東西均平光極中央臨照四方吾為汝說玄文洞章世人受誦變災為祥至士得之玄景靈光吾巳為汝說北斗本命之訣南斗六司之文度人無量劫劫長存吾今復為汝說玉靈瑶篇東斗帝君之名主算延年使傳下世能度三塗五苦八難之厄能與削死上生大計之令總監形魂玄妙真默無極無窮老君曰東方之神以斗為鄰長生大聖韓君丈人執我之柄不死之神輔我之左長生之君弼我之右司馬大神行我之政司命司録延壽益算無量度人青帝與我護魂太上與我扶身巴元醜伯魔王之真從我所願延救天人急急如律令
  hash: sha256:8a6aac4c7d1bf0e656bc40019f38de6ea1741a407d558256165f52419a1723d4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0006_HFL_000-001a, image: hfl/0341/0341-057.png}
body:
  text: 呪曰大道著明寂默玄冥五斗中運四時生成北都萬鬼遏人年齡我有洞章度世長生供養尊禮主人精神玄中有玄峨峨玉京急急如律令東斗第一蒼靈延生真君東斗第二陵光護命真君東斗第三關天大衛集福真君東斗第四大明和陽保和真君東斗第五尾極總監真君老君曰凡人受誦必須至誠齊心東向叩齒心拜跪坐閉目存神如見東方無極之鄉玄靈帝君至真大聖無鞅之衆羅列周匝如得監度有災之日宜於本命生辰或月之朔望月之九日或家庭觀宇以時花珍果焚香靜念望東斗帝君醮謝罪業求益壽年大靈所與獲福無量至人授度逍遙上清此經玄奧深不可詳太上說經周竟於玉局座謂天師曰玄文祕法授非其人殃及九祖所以賜汝流行正道救度天人令得長生天師再拜頂禮受之如法奉行自此傳於世矣太上說東斗主算護命妙經
  hash: sha256:d6e954df817bd0117e7bb1fb3f4a5fa009ac6fafcd17302262c9dedc4c711fe7
